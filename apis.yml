description: >-
  Stryker Corporation is a Fortune 500 medical technologies company offering products in orthopedics,
  medical and surgical equipment, and neurotechnology and spine. Stryker provides Connected OR
  integration platforms and Smart Equipment Management (SEM) systems for healthcare facilities.
  The company does not currently offer a publicly documented developer API. Stryker's digital
  health products include the Mako robotic arm for orthopedic surgery, iSuite integrated OR
  technology, and asset tracking systems. Integration with hospital EHR and OR management
  systems is done through vendor partnerships rather than public APIs.
